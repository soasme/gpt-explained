project:
  type: book
  output-dir: _book
  pre-render:
    - python3 tools/refresh_code_snippets.py

filters:
  - include-code-files

lang: en
license: "CC BY-NC-SA 3.0"

book:
  title: "GPT Explained"
  subtitle: "A hands-on guide to transformer architecture"
  author: "Ju Lin"
  description: "A practical guide to GPT-style transformer architecture, from tokens to text generation, with math, matrices, Python, and diagrams."
  reader-mode: true
  output-file: gpt-explained
  site-url: "https://soasme.github.io/gpt-explained/"
  repo-url: "https://github.com/soasme/gpt-explained"
  repo-branch: main
  repo-actions: [edit, issue]
  page-footer:
    left: |
      GPT Explained was written by Ju Lin.
    right: |
      This book was built with [Quarto](https://quarto.org/).
  downloads:
    - pdf
    - epub
  search: true
  page-navigation: true
  chapters:
    - index.qmd
    - book/license.qmd
    - book/preface.qmd
    - book/contributors.qmd
    - part: parts/foundations.qmd
      chapters:
        - ch01-introduction.qmd
        - ch02-notation.qmd
    - part: parts/representations.qmd
      chapters:
        - ch03-tokens.qmd
        - ch04-embeddings.qmd
        - ch05-positional-encoding.qmd
    - part: parts/transformer-core.qmd
      chapters:
        - ch06-attention.qmd
        - ch07-rope.qmd
        - ch08-multi-head-attention.qmd
        - ch09-feed-forward.qmd
        - ch10-transformer-block.qmd
    - part: parts/prediction-and-learning.qmd
      chapters:
        - ch11-vocab-projection.qmd
        - ch12-loss.qmd
        - ch13-training.qmd
    - part: parts/modern-gpt.qmd
      chapters:
        - ch14-modern-gpt.qmd
  appendices:
    - A-microgpt.qmd

format:
  html:
    toc: true
    toc-depth: 2
    number-sections: true
    theme:
      - cosmo
      - gpt-explained.scss
    code-copy: true
    code-link: true
    code-overflow: wrap
    callout-appearance: simple
    link-external-newwindow: true
    author-meta: "Ju Lin"
  epub:
    toc: true
    toc-depth: 2
    number-sections: true
    css: gpt-explained.css
  pdf:
    documentclass: scrreprt
    toc: true
    toc-depth: 2
    number-sections: true
    colorlinks: true

execute:
  freeze: auto
