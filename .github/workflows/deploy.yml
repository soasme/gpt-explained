name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Render Manim animations ──────────────────────────────
  render-animations:
    name: Render Manim Scenes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (LaTeX + Cairo + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-extra texlive-fonts-recommended \
            texlive-science dvipng cm-super \
            libcairo2-dev libpango1.0-dev ffmpeg \
            fonts-dejavu
          echo "LaTeX + Cairo + ffmpeg installed"

      - name: Install Manim CE
        run: pip install manim --quiet

      - name: Render all chapter scenes (low quality, PNG stills)
        run: |
          cd src/manim
          mkdir -p ../images

          SCENES=(
            "ch01_tokens.py:Ch01BPEMerges:ch01-bpe-merges"
            "ch01_tokens.py:Ch01TokenizationPipeline:ch01-tokenization-pipeline"
            "ch02_embeddings.py:Ch02EmbeddingLookup:ch02-embedding-lookup"
            "ch02_embeddings.py:Ch02SemanticSpace:ch02-semantic-space"
            "ch03_positional_encoding.py:Ch03PositionalEncoding:ch03-positional-encoding"
            "ch03_positional_encoding.py:Ch03SinWaves:ch03-sin-waves"
            "ch04_attention.py:Ch04AttentionWeights:ch04-attention-weights"
            "ch04_attention.py:Ch04QKVDiagram:ch04-qkv-diagram"
            "ch05_multi_head_attention.py:Ch05MultiHeadAttention:ch05-multi-head-attention"
            "ch06_ffn.py:Ch06FFN:ch06-ffn"
            "ch06_ffn.py:Ch06MemoryInterpretation:ch06-memory"
            "ch07_transformer_block.py:Ch07TransformerBlock:ch07-transformer-block"
            "ch07_transformer_block.py:Ch07ResidualStream:ch07-residual-stream"
            "ch08_vocab_projection.py:Ch08VocabProjection:ch08-vocab-projection"
            "ch08_vocab_projection.py:Ch08GenerationLoop:ch08-generation-loop"
          )

          for entry in "${SCENES[@]}"; do
            IFS=: read -r script scene output_name <<< "$entry"
            echo "Rendering $scene from $script..."
            manim -ql --format=png -s "$script" "$scene" 2>&1 | tail -5 || true
            # Find and copy the generated PNG
            PNG=$(find media/images -name "*.png" | grep -i "$(echo $scene | tr '[:upper:]' '[:lower:]')" | head -1 || true)
            if [ -n "$PNG" ]; then
              cp "$PNG" "../images/${output_name}.png"
              echo "  ✓ saved images/${output_name}.png"
            else
              # Fallback: copy any most-recently-modified PNG
              PNG=$(find media/images -name "*.png" -newer /tmp -printf '%T@ %p\n' 2>/dev/null | sort -n | tail -1 | awk '{print $2}' || true)
              if [ -n "$PNG" ]; then
                cp "$PNG" "../images/${output_name}.png"
                echo "  ✓ saved images/${output_name}.png (fallback)"
              else
                echo "  ⚠ no PNG found for $scene"
              fi
            fi
          done
          echo "Animation rendering complete."

      - name: Upload rendered images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-images
          path: src/images/
          retention-days: 7

  # ── Job 2: Build mdbook ──────────────────────────────────────────
  build-book:
    name: Build mdBook
    runs-on: ubuntu-latest
    needs: render-animations
    steps:
      - uses: actions/checkout@v4

      - name: Download rendered images
        uses: actions/download-artifact@v4
        with:
          name: rendered-images
          path: src/images/

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin
          mdbook --version

      - name: Build book
        run: mdbook build

      - name: Upload book artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-html
          path: book/
          retention-days: 7

      - name: Setup GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/

  # ── Job 3: Deploy to gh-pages ────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-book
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
