name: Release on push to main

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install system dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y --no-install-recommends \
          cmake bison flex \
          libpango1.0-dev libcairo2-dev \
          libgdk-pixbuf2.0-dev libxml2-dev \
          pkg-config

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Manim
      run: pip install manim

    - name: Generate images
      run: bash src/manim/render_all.sh

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.1
        bundler-cache: true

    - name: Ensure mathematical native lib
      run: |
        LIB_DIR="vendor/gems/mathematical-1.6.20/ext/mathematical/lib"
        if [ ! -f "$LIB_DIR/liblasem.so" ]; then
          echo "liblasem.so missing — recompiling mathematical native extension"
          cd vendor/gems/mathematical-1.6.20/ext/mathematical
          bundle exec ruby extconf.rb
          make
        fi

    - name: Build release assets
      run: bundle exec rake book:build

    - name: Compute tag name
      id: compute-tag
      run: |
        echo Computing next tag number
        LASTPATCH=$(git describe --tags 2>/dev/null | cut -d- -f1 | cut -d. -f3 || echo 0)
        PATCH=$(($LASTPATCH+1))
        echo "tagname=1.0.${PATCH}" >> $GITHUB_OUTPUT

    - name: Create release
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ steps.compute-tag.outputs.tagname }}
        commit: main
        artifacts: './gpt-explained.epub,./gpt-explained.fb2.zip,./gpt-explained.pdf,./gpt-explained.html'

    - name: Prepare GitHub Pages content
      run: |
        mkdir -p gh-pages-content
        cp gpt-explained.html gh-pages-content/index.html
        cp gpt-explained.pdf gh-pages-content/gpt-explained.pdf
        cp gpt-explained.epub gh-pages-content/gpt-explained.epub

    - name: Publish to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./gh-pages-content
