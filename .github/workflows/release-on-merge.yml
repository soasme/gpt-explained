name: Release on push to main

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.1
        bundler-cache: true

    - name: Build release assets
      run: bundle exec rake book:build

    - name: Compute tag name
      id: compute-tag
      run: |
        echo Computing next tag number
        LASTPATCH=$(git describe --tags 2>/dev/null | cut -d- -f1 | cut -d. -f3 || echo 0)
        PATCH=$(($LASTPATCH+1))
        echo "tagname=1.0.${PATCH}" >> $GITHUB_OUTPUT

    - name: Create release
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ steps.compute-tag.outputs.tagname }}
        commit: main
        artifacts: './gpt-explained.epub,./gpt-explained.fb2.zip,./gpt-explained.mobi,./gpt-explained.pdf,./gpt-explained.html'
