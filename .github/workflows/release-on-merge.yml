name: Release on push to main

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install system dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y --no-install-recommends graphviz librsvg2-bin

    - name: Set up Quarto
      uses: quarto-dev/quarto-actions/setup@v2
      with:
        tinytex: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m venv .venv
        .venv/bin/pip install -r requirements.txt

    - name: Generate images
      run: |
        mkdir -p images
        .venv/bin/python src/matplotlib/render_all.py

    - name: Run code examples
      run: .venv/bin/python src/python/run_book_code.py

    - name: Generate contributors list
      run: .venv/bin/python tools/refresh_code_snippets.py

    - name: Build release assets
      run: quarto render

    - name: Compute tag name
      id: compute-tag
      run: |
        echo Computing next tag number
        LASTPATCH=$(git describe --tags 2>/dev/null | cut -d- -f1 | cut -d. -f3 || echo 0)
        PATCH=$(($LASTPATCH+1))
        echo "tagname=1.0.${PATCH}" >> $GITHUB_OUTPUT

    - name: Create release
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ steps.compute-tag.outputs.tagname }}
        commit: main
        artifacts: './_book/gpt-explained.epub,./_book/gpt-explained.pdf'

    - name: Prepare GitHub Pages content
      run: |
        mkdir -p gh-pages-content
        cp -R _book/. gh-pages-content/

    - name: Publish to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./gh-pages-content
